<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Tiny Steps Kids v2</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--p:#7c3aed;--pl:#ede9ff;--pd:#5b21b6;--g:#059669;--gl:#d1fae5;--b:#2563eb;--bl:#dbeafe;--r:#dc2626;--rl:#fee2e2;--y:#d97706;--yl:#fef3c7;--ink:#111827;--ink2:#374151;--ink3:#6b7280;--ink4:#9ca3af;--bg:#f9fafb;--card:#fff;--bd:#e5e7eb;--f:'Nunito',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--f);color:var(--ink);background:var(--bg);font-size:14px;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:var(--f)}
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
.topbar{background:var(--ink);flex-shrink:0;padding:env(safe-area-inset-top,0) 0 0}
.tb-inner{display:flex;align-items:center;justify-content:space-between;padding:11px 16px 10px;gap:10px}
.brand{display:flex;align-items:center;gap:9px}
.brand-logo{width:34px;height:34px;border-radius:9px;overflow:hidden;flex-shrink:0}
.brand-logo img{width:100%;height:100%;object-fit:cover}
.brand-name{color:#fff;font-size:15px;font-weight:800}
.brand-sub{color:rgba(255,255,255,.35);font-size:9px;text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px}
.lang-sw{display:flex;background:rgba(255,255,255,.1);border-radius:20px;padding:2px;gap:2px}
.lb{padding:4px 10px;border-radius:18px;border:none;background:transparent;color:rgba(255,255,255,.5);font-size:11px;font-weight:800;cursor:pointer;font-family:var(--f)}
.lb.on{background:#fff;color:var(--ink)}
.user-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);border-radius:20px;padding:4px 11px;font-size:11px;font-weight:700;cursor:pointer;border:none}
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pad{padding:16px}
.bn{display:flex;background:#fff;border-top:1px solid var(--bd);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 10px;border:none;background:none;color:var(--ink4);font-size:9px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;gap:2px}
.bi.on{color:var(--p)}
.bi .ic{font-size:19px;line-height:1}
.card{background:var(--card);border-radius:14px;border:1px solid var(--bd);margin-bottom:10px}
.card-p{padding:14px}
.card-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:12px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--card);border-radius:12px;border:1px solid var(--bd);padding:13px}
.stat-n{font-size:30px;font-weight:900;line-height:1}
.stat-l{font-size:10px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:3px}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 18px;border-radius:10px;border:none;font-size:13px;font-weight:800;cursor:pointer;width:100%;font-family:var(--f)}
.btn-p{background:var(--p);color:#fff}
.btn-g{background:var(--g);color:#fff}
.btn-dark{background:var(--ink);color:#fff}
.btn-out{background:#fff;color:var(--ink);border:1.5px solid var(--bd)}
.btn-r{background:var(--r);color:#fff}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}
.btn-sm{padding:8px 14px;font-size:12px;width:auto;border-radius:8px}
.btn-xs{padding:5px 11px;font-size:11px;width:auto;border-radius:7px}
.fg{margin-bottom:12px}
.fl{display:block;font-size:10px;font-weight:800;color:var(--ink3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.fi{width:100%;padding:11px 13px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;background:#fff;color:var(--ink);outline:none;-webkit-appearance:none}
.fi:focus{border-color:var(--p)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.full{grid-column:1/-1}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .18s;backdrop-filter:blur(4px)}
.ov.show{opacity:1;pointer-events:all}
.drawer{background:#fff;border-radius:22px 22px 0 0;width:100%;max-height:94vh;overflow-y:auto;padding:0 15px 32px;transform:translateY(100%);transition:transform .25s cubic-bezier(.22,1,.36,1)}
.ov.show .drawer{transform:none}
.dhandle{width:34px;height:4px;background:var(--bd);border-radius:2px;margin:13px auto 17px}
.dtitle{font-size:20px;font-weight:900;margin-bottom:16px;color:var(--ink)}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800}
.pill-p{background:var(--pl);color:var(--pd)}
.pill-g{background:var(--gl);color:#065f46}
.pill-b{background:var(--bl);color:#1e40af}
.pill-y{background:var(--yl);color:#92400e}
.pill-r{background:var(--rl);color:#991b1b}
.pill-gray{background:#f3f4f6;color:var(--ink3)}
.sc{background:#fff;border-radius:14px;border:1px solid var(--bd);padding:13px;display:flex;align-items:flex-start;gap:11px;cursor:pointer;margin-bottom:9px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--p)}
.sc.girl::before{background:#ec4899}
.sc.boy::before{background:var(--b)}
.av{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.av-f{background:linear-gradient(135deg,#f9a8d4,#ec4899)}
.av-m{background:linear-gradient(135deg,#93c5fd,#3b82f6)}
.sc-info{flex:1;min-width:0}
.sc-nick{font-size:15px;font-weight:800}
.sc-name{font-size:11px;color:var(--ink3);margin-top:1px}
.sc-meta{font-size:10px;color:var(--ink4);margin-top:2px}
.sc-score{flex-shrink:0;text-align:right}
.sc-n{font-size:22px;font-weight:900;line-height:1}
.sc-l{font-size:8px;color:var(--ink4);text-transform:uppercase;margin-top:1px}
.mbars{display:flex;gap:3px;margin-top:8px}
.mb{flex:1;text-align:center}
.mb-t{height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.mb-f{height:100%;border-radius:2px}
.mb-l{font-size:7px;color:var(--ink4);margin-top:2px;font-weight:700}
.pbar{background:var(--bd);border-radius:20px;height:8px;position:relative;overflow:visible}
.pbar-f{height:100%;border-radius:20px}
.pbar-mk{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--b);border-radius:1px;z-index:2}
.item{border:1.5px solid var(--bd);border-radius:10px;margin-bottom:8px;overflow:hidden;background:#fff}
.item.s1{border-color:var(--r);background:#fff9f9}
.item.s2{border-color:var(--y);background:#fffdf5}
.item.s3{border-color:var(--b);background:#f8faff}
.item.s4{border-color:var(--g);background:#f8fdf9}
.item.cp{border-color:var(--g);background:var(--gl)}
.item.cf{border-color:var(--r);background:var(--rl)}
.item-head{padding:10px 12px 6px}
.item-code{font-size:9px;font-weight:800;color:var(--ink4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.item-en{font-size:13px;font-weight:700;line-height:1.4}
.item-th{font-size:11.5px;color:var(--ink2);margin-top:2px;line-height:1.4}
.crit-btn{width:100%;padding:4px 12px 8px;font-size:10px;font-weight:800;color:var(--b);cursor:pointer;background:none;border:none;text-align:left;font-family:var(--f)}
.crit-body{border-top:1px solid var(--bd)}
.crit-row{display:flex;gap:8px;padding:7px 10px;border-bottom:1px solid var(--bd);font-size:11px}
.crit-row:last-child{border-bottom:none}
.crit-n{width:18px;height:18px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;margin-top:1px}
.crit-t{flex:1;line-height:1.5;color:var(--ink2)}
.scale-wrap{padding:8px 12px 11px}
.scale-lbl{font-size:9px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.scale-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.sb{padding:10px 4px;border-radius:8px;border:1.5px solid var(--bd);background:#fff;cursor:pointer;text-align:center;font-family:var(--f)}
.sb .sn{font-size:19px;font-weight:900;line-height:1;margin-bottom:2px}
.sb .sl{font-size:8px;font-weight:700;text-transform:uppercase;color:var(--ink3)}
.sb.on1{border-color:var(--r);background:var(--rl)}.sb.on1 .sn,.sb.on1 .sl{color:var(--r)}
.sb.on2{border-color:var(--y);background:var(--yl)}.sb.on2 .sn,.sb.on2 .sl{color:var(--y)}
.sb.on3{border-color:var(--b);background:var(--bl)}.sb.on3 .sn,.sb.on3 .sl{color:var(--b)}
.sb.on4{border-color:var(--g);background:var(--gl)}.sb.on4 .sn,.sb.on4 .sl{color:var(--g)}
.cdc-wrap{display:flex;gap:8px;padding:8px 12px 11px}
.cb{flex:1;padding:11px;border-radius:10px;border:1.5px solid var(--bd);background:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--f)}
.cb.pass{border-color:var(--g);background:var(--gl);color:#065f46}
.cb.fail{border-color:var(--r);background:var(--rl);color:#991b1b}
.sdq-opt{display:flex;gap:6px;padding:8px 12px 11px}
.so{flex:1;padding:10px 6px;border-radius:10px;border:1.5px solid var(--bd);background:#fff;font-size:11.5px;font-weight:700;cursor:pointer;text-align:center;font-family:var(--f);color:var(--ink3)}
.so.on{border-color:var(--p);background:var(--pl);color:var(--pd)}
.na-box{background:var(--gl);border:1.5px solid var(--g);border-radius:10px;padding:11px 13px;margin:0 12px 10px}
.na-title{font-size:10px;font-weight:800;color:#065f46;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.na-text{font-size:12px;color:#166534;line-height:1.5;margin-bottom:7px}
.na-input{width:100%;padding:8px 10px;border:1px solid #86efac;border-radius:7px;font-size:12px;background:#fff;outline:none;resize:vertical;font-family:var(--f)}
.mc{background:#fff;border-radius:12px;border:1px solid var(--bd);padding:13px;margin-bottom:9px}
.mc-title{font-size:14px;font-weight:800;margin-bottom:5px}
.mc-desc{font-size:12px;color:var(--ink3);margin-bottom:10px;line-height:1.5}
.mc-check{display:flex;flex-direction:column;gap:6px}
.mc-item{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--bg);border-radius:8px;cursor:pointer}
.mc-item.done{background:var(--gl)}
.mc-cb{width:18px;height:18px;border-radius:5px;border:2px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px}
.mc-item.done .mc-cb{background:var(--g);border-color:var(--g);color:#fff}
.mc-text{font-size:12px;font-weight:700;flex:1}
.mc-item.done .mc-text{text-decoration:line-through;color:var(--ink4)}
.nc{background:#fff;border-radius:12px;border:1px solid var(--bd);padding:12px;margin-bottom:8px;border-left:3px solid var(--p)}
.nc.unread{border-left-color:var(--r);background:#fff8f8}
.nc-cat{font-size:9px;font-weight:800;color:var(--ink4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.nc-text{font-size:13px;line-height:1.5;color:var(--ink)}
.nc-meta{font-size:10px;color:var(--ink4);margin-top:5px}
.flag{background:var(--rl);border:1.5px solid var(--r);border-radius:10px;padding:11px 13px;margin-bottom:10px}
.flag-t{font-size:12px;font-weight:800;color:var(--r);margin-bottom:3px}
.flag-d{font-size:11px;color:#7f1d1d;line-height:1.5}
.d5{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
.dc{background:#fff;border-radius:10px;border:1px solid var(--bd);padding:8px 3px;text-align:center;border-top:3px solid transparent}
.dc-ic{font-size:17px}
.dc-nm{font-size:7px;color:var(--ink3);font-weight:800;text-transform:uppercase;letter-spacing:.03em;margin:2px 0}
.dc-v{font-size:18px;font-weight:900;line-height:1}
.hero{border-radius:14px;overflow:hidden;margin-bottom:12px}
.hero-top{padding:15px;display:flex;align-items:center;gap:11px}
.hero-av{width:48px;height:48px;border-radius:13px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:900;color:#fff;flex-shrink:0}
.hero-name{font-size:20px;font-weight:900;color:#fff;line-height:1.1}
.hero-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px}
.hero-btns{display:flex;gap:7px;padding:9px 13px;background:rgba(0,0,0,.18);flex-wrap:wrap}
.hbtn{padding:9px 12px;border-radius:8px;border:none;font-size:12px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:var(--f);white-space:nowrap}
.hbtn-w{background:#fff;color:var(--ink)}
.hbtn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2)}
.pub-hero{background:linear-gradient(135deg,#7c3aed,#a78bfa);border-radius:16px;padding:20px;margin-bottom:16px;text-align:center;color:#fff}
.pub-logo{width:72px;height:72px;border-radius:16px;overflow:hidden;margin:0 auto 12px}
.pub-logo img{width:100%;height:100%;object-fit:cover}
.pub-title{font-size:22px;font-weight:900;margin-bottom:4px}
.pub-sub{font-size:13px;opacity:.75;line-height:1.5}
.login-wrap{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#ede9ff,#dbeafe)}
.login-card{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.login-logo{width:72px;height:72px;border-radius:16px;overflow:hidden;margin:0 auto 14px}
.login-logo img{width:100%;height:100%;object-fit:cover}
.login-title{font-size:22px;font-weight:900;text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--ink3);text-align:center;margin-bottom:20px}
.role-pick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.rp{padding:12px;border-radius:10px;border:1.5px solid var(--bd);background:#fff;text-align:center;cursor:pointer;font-family:var(--f)}
.rp.on{border-color:var(--p);background:var(--pl)}
.rp-ic{font-size:24px;display:block;margin-bottom:4px}
.rp-lbl{font-size:12px;font-weight:800;color:var(--ink3)}
.rp.on .rp-lbl{color:var(--pd)}
.rp3{grid-column:1/-1}
.dom-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.df{padding:6px 12px;border-radius:20px;border:1.5px solid var(--bd);background:#fff;font-size:11px;font-weight:800;color:var(--ink3);cursor:pointer}
.df.on{border-color:var(--p);background:var(--pl);color:var(--pd)}
.chart-wrap{position:relative;height:170px;margin-bottom:4px}
.ax-x{font-size:9px;color:var(--ink4);text-align:center;margin-top:2px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.ax-y{position:absolute;left:-2px;top:50%;transform:translateY(-50%) rotate(-90deg);font-size:8px;color:var(--ink4);font-weight:700;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;pointer-events:none}
.lgd{display:flex;flex-wrap:wrap;gap:5px 10px;margin-bottom:8px}
.li{display:flex;align-items:center;gap:4px;font-size:9.5px;font-weight:700;color:var(--ink3)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sdq-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sdq-c{padding:11px;background:var(--bg);border-radius:10px;border-left:3px solid}
.sdq-l{font-size:9px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.sdq-n{font-size:22px;font-weight:900;line-height:1}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:400px}
th{background:var(--bg);padding:7px 8px;text-align:left;font-weight:800;color:var(--ink3);border-bottom:1px solid var(--bd);font-size:10px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
td{padding:7px 8px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.sec{font-size:10px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--bd)}
.empty{text-align:center;padding:44px 16px}
.empty-ic{font-size:44px;display:block;margin-bottom:10px}
.empty-t{font-size:14px;font-weight:700;color:var(--ink3);margin-bottom:14px}
#toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;padding:9px 18px;border-radius:100px;font-size:12.5px;font-weight:700;opacity:0;transition:.2s;z-index:999;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%)}
#ld{position:fixed;inset:0;background:var(--ink);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.ld-logo{width:72px;height:72px;border-radius:18px;overflow:hidden}
.ld-logo img{width:100%;height:100%;object-fit:cover}
.ld-t{color:#fff;font-size:22px;font-weight:900}
.ld-s{color:rgba(255,255,255,.35);font-size:10px;text-transform:uppercase;letter-spacing:.08em}
.ld-bar{width:80px;height:2px;background:rgba(255,255,255,.1);border-radius:1px;margin-top:16px;overflow:hidden}
.ld-p{height:100%;background:var(--p);animation:lb 1s ease-in-out infinite}
@keyframes lb{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
@media print{#app,body{display:block;height:auto;overflow:visible}.topbar,.bn,.ov,#toast,#ld{display:none!important}.page{overflow:visible}}
</style>
</head>

let S={user:null,role:null,ch:[],as:[],missions:[],logs:[],notes:[],leads:[],tab:'home',sel:null,charts:{},form:null};
const $=id=>document.getElementById(id);
const wait=ms=>new Promise(r=>setTimeout(r,ms));
function mos(bd){const b=new Date(bd),n=new Date();return(n.getFullYear()-b.getFullYear())*12+(n.getMonth()-b.getMonth())}
function ageS(bd){const m=mos(bd);return Math.floor(m/12)+'y '+(m%12)+'m'}
function ageTH(bd){const m=mos(bd),y=Math.floor(m/12),r=m%12;return y?`${y} ปี ${r} เดือน`:`${m} เดือน`}
function fw(bd){const m=mos(bd);return m<84?'cdc':m<132?'sdq7':'sdq10'}
function mkey(bd){const m=mos(bd);return m<21?18:m<27?24:m<33?30:m<42?36:m<54?48:60}
function cAss(id){return S.as.filter(a=>String(a.studentId)===String(id)).sort((a,b)=>new Date(a.date)-new Date(b.date))}
function lastAss(id){const a=cAss(id);return a[a.length-1]||null}
function baseAss(id){return S.as.find(a=>String(a.studentId)===String(id)&&a.phase==='Initial Assessment')||null}
function nxtWk(id){const a=S.as.filter(x=>String(x.studentId)===String(id));return a.length?Math.max(...a.map(x=>+x.weekNumber||0))+1:1}
function childPhase(id){return S.as.some(a=>String(a.studentId)===String(id)&&a.phase==='Initial Assessment')?'Weekly Check-in':'Initial Assessment'}
function destroyCh(){Object.values(S.charts).forEach(c=>{try{c.destroy()}catch(e){}});S.charts={}}
function toast(m){const el=$('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2300)}
function tryParse(v){try{return JSON.parse(v)}catch(e){return null}}
function statusOf(s){
  if(s===null||s===undefined||s===''||isNaN(Number(s)))return{lbl:'N/A',cls:'pill-gray',clr:'var(--ink4)'};
  s=Number(s);
  if(s>=76)return{lbl:t('excellent'),cls:'pill-g',clr:'#059669'};
  if(s>=51)return{lbl:t('good'),cls:'pill-b',clr:'#2563eb'};
  if(s>=26)return{lbl:t('developing'),cls:'pill-y',clr:'#d97706'};
  return{lbl:t('emerging'),cls:'pill-r',clr:'#dc2626'};
}
function sparseL(arr){const s=[],d=[];let lv=null,li=null;arr.forEach((v,i)=>{if(v!==null&&v!==undefined&&v!==''){if(lv!==null&&li!==null&&i>li+1)for(let j=li;j<=i;j++)d[j]=lv+(v-lv)*(j-li)/(i-li);s[i]=v;lv=v;li=i;}else{s[i]=null;if(lv!==null)d[i]=lv;}});return{solid:s,dotted:d}}
function getFlagDesc(flag){return({
  'ASD Screening':'Low SE + LG — discuss ASD screening with parents',
  'Motor Delay':'Low GM + SC — consider OT/PT referral',
  'Language Delay':'Very low LG — consider speech therapy referral',
  'Global Delay':'3+ domains below 40% — consider paediatrician review',
  'ADHD Screening':'High Hyperactivity SDQ — consider ADHD screening',
  'Emotional Support':'High Emotional SDQ — consider anxiety/depression support',
  'Monitor':'One domain low — observe closely',
})[flag]||flag}
function fwBadge(bd){const f=fw(bd);return f==='cdc'?'<span class="pill pill-g">CDC 2-6y</span>':f==='sdq7'?'<span class="pill pill-b">SDQ 7-10y</span>':'<span class="pill pill-p">SDQ 11-15y</span>'}

async function GET(action,params={}){
  const u=new URL(GAS);u.searchParams.set('action',action);Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));
  try{const r=await fetch(u.toString(),{redirect:'follow'});return await r.json();}catch(e){return{error:e.message};}
}
async function POST(action,payload={}){
  try{const r=await fetch(GAS,{method:'POST',body:JSON.stringify({action,payload}),headers:{'Content-Type':'application/json'},redirect:'follow'});return await r.json();}catch(e){return{error:e.message};}
}

let loginRole='teacher';
function setRole(r){loginRole=r;['teacher','parent'].forEach(x=>{$('rp-'+(x==='teacher'?'t':'p')).classList.toggle('on',x===r);})}
async function doLogin(){
  const email=$('li-email').value.trim(),pin=$('li-pin').value.trim();
  if(!email||!pin){toast('Please enter email and PIN');return}
  const btn=$('li-btn');btn.textContent='Signing in...';btn.disabled=true;
  const res=await POST('login',{email,pin});
  btn.textContent='Sign In';btn.disabled=false;
  if(!res.ok){toast(res.error||'Invalid email or PIN');return}
  S.user=res.user;S.role=res.user.role;
  await loadAll();showApp();
}
async function doLogout(){S.user=null;S.role=null;S.ch=[];S.as=[];S.missions=[];S.logs=[];S.notes=[];destroyCh();$('app').style.display='none';$('login-page').style.display='block';$('li-pin').value='';}
function goPublic(){$('login-page').style.display='none';$('pub-page').style.display='block';renderPublic();}
async function loadAll(){
  const data=await GET('all',{role:S.role,uid:S.user.id});
  S.ch=data.students||[];S.as=data.assessments||[];S.missions=data.missions||[];S.logs=data.missionLogs||[];S.notes=data.notes||[];S.leads=data.leads||[];
}
function showApp(){
  $('login-page').style.display='none';$('app').style.display='flex';
  $('user-pill').textContent=S.user.name+' ▾';buildNav();
  go(S.role==='teacher'?'home':'progress');
}

    return`<div class="mc"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div><div class="mc-title">${m.title}</div><div style="font-size:10px;color:var(--ink4)">Week ${m.weekNumber}${m.dueDate?' · Due: '+m.dueDate:''}</div></div><span class="pill ${m.status==='Completed'?'pill-g':'pill-y'}">${m.status==='Completed'?'Done':'Pending'}</span></div>
    ${m.description?`<div class="mc-desc">${m.description}</div>`:''}
    ${cl.length?`<div class="mc-check">${cl.map((item,i)=>{const isDone=done.includes(String(i));return`<div class="mc-item ${isDone?'done':''}" onclick="toggleMI('${m.id}',${i},${JSON.stringify(cl)},${JSON.stringify(done)})"><div class="mc-cb">${isDone?'✓':''}</div><div class="mc-text">${item}</div></div>`;}).join('')}</div>${m.status!=='Completed'?`<button class="btn btn-g btn-sm" style="margin-top:10px" onclick="completeMAll('${m.id}',${JSON.stringify(cl)})">Mark All Complete</button>`:''}`:''}</div>`;
  }).join('');
  h+=`</div>`;$('pg').innerHTML=h;
}
async function toggleMI(missionId,idx,checklist,completed){
  const nc=completed.includes(String(idx))?completed.filter(i=>i!==String(idx)):[...completed,String(idx)];
  await POST('completeMission',{missionId,studentId:S.ch[0]?.id,parentId:S.user.id,completedItems:nc,notes:''});
  const m=S.missions.find(x=>x.id===missionId);let log=S.logs.find(l=>l.missionId===missionId);
  if(log)log.completedItems=JSON.stringify(nc);else S.logs.push({missionId,completedItems:JSON.stringify(nc)});
  if(nc.length===checklist.length&&m)m.status='Completed';
  renderParentMissions(S.ch[0]);
}
async function completeMAll(missionId,checklist){
  const allIdx=checklist.map((_,i)=>String(i));await POST('completeMission',{missionId,studentId:S.ch[0]?.id,parentId:S.user.id,completedItems:allIdx,notes:''});
  const m=S.missions.find(x=>x.id===missionId);if(m)m.status='Completed';let log=S.logs.find(l=>l.missionId===missionId);if(log)log.completedItems=JSON.stringify(allIdx);else S.logs.push({missionId,completedItems:JSON.stringify(allIdx)});
  renderParentMissions(S.ch[0]);
}
function renderParentNotes(c){
  if(!c){$('pg').innerHTML=`<div class="empty"><span class="empty-ic">✉</span><div class="empty-t">No child linked.</div></div>`;return}
  const cats=['General','Behavior','Eating','Sleep','Social','Health','Other'];
  const myNotes=S.notes.filter(n=>n.studentId===c.id).sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
  let h=`<div class="pad"><div class="sec" style="margin-bottom:12px">Send Note to Kru Lukpad</div>
  <div class="card card-p" style="margin-bottom:14px">
    <div class="fg"><label class="fl">Category</label><select id="note-cat" class="fi">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div>
    <div class="fg" style="margin-bottom:10px"><label class="fl">Your note *</label><textarea id="note-txt" class="fi" rows="3" placeholder="Share what you observe at home this week..."></textarea></div>
    <button class="btn btn-p" onclick="doAddNote('${c.id}')">Send Note</button>
  </div>
  <div class="sec" style="margin-bottom:10px">Previous Notes</div>`;
  if(!myNotes.length)h+=`<div class="empty"><span class="empty-ic">✉</span><div class="empty-t">No notes yet.</div></div>`;
  else h+=myNotes.map(n=>`<div class="nc"><div class="nc-cat">${n.category||'General'}</div><div class="nc-text">${n.content}</div><div class="nc-meta">${n.createdAt?new Date(n.createdAt).toLocaleDateString('en-GB'):''}</div></div>`).join('');
  h+=`</div>`;$('pg').innerHTML=h;
}
async function doAddNote(sid){
  const content=$('note-txt').value.trim();if(!content){toast('Please write your note');return}
  const res=await POST('addNote',{studentId:sid,parentId:S.user.id,category:$('note-cat').value,content});
  if(res.error){toast('Error: '+res.error);return}
  S.notes.unshift({id:res.id,studentId:sid,parentId:S.user.id,category:$('note-cat').value,content,isRead:'false',createdAt:new Date().toISOString()});
  toast('Note sent!');renderParentNotes(S.ch[0]);
}
function renderParentReport(c){
  if(!c){$('pg').innerHTML=`<div class="empty"><span class="empty-ic">📄</span><div class="empty-t">No child linked.</div></div>`;return}
  const last=lastAss(c.id);
  let h=`<div class="pad"><div class="sec" style="margin-bottom:12px">Progress Report</div>`;
  if(!last){h+=`<div class="empty"><span class="empty-ic">📄</span><div class="empty-t">No report yet.</div></div>`;$('pg').innerHTML=h;return}
  h+=`<div class="card card-p"><div class="card-title">${c.nickname}'s Development Report</div><div style="font-size:13px;color:var(--ink2);margin-bottom:14px">Week ${last.weekNumber||1} · ${last.date} · ${last.phase}</div><button class="btn btn-dark" onclick="doPrint('${c.id}')">Print / Save as PDF</button></div>`;
  h+=`</div>`;$('pg').innerHTML=h;
}

function startPubAssess(){
  const cname=$('pub-cname').value.trim(),bd=$('pub-bd').value,pname=$('pub-pname').value.trim(),email=$('pub-email').value.trim(),phone=$('pub-phone').value.trim();
  if(!cname||!bd||!pname||!email||!phone){toast('Please fill all required fields (*)');return}
  PUB.info={childName:cname,birthdate:bd,gender:$('pub-sex').value,concern:$('pub-concern').value,parentName:pname,email,phone};
  PUB.step=1;renderPublic();
}
function renderPubAssess(){
  const f=fw(PUB.info.birthdate);const key=mkey(PUB.info.birthdate);
  let h=`<div style="max-width:480px;margin:0 auto"><div class="pub-hero" style="padding:16px"><div style="font-size:18px;font-weight:900">${PUB.info.childName}'s Screening</div><div style="font-size:12px;opacity:.75">${f==='cdc'?`CDC 2026 · ${key}m set`:'SDQ Assessment'}</div></div>
  <div style="background:var(--bl);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:11px;color:#1e40af">Answer based on what you observe at home. This is a general screening — not a clinical diagnosis.</div>`;
  if(f==='cdc'){
    DOMS.forEach(d=>{const items=CDC[d]||[];const si=items.filter(i=>!i.type);h+=`<div style="margin-bottom:14px"><div style="font-size:13px;font-weight:800;margin-bottom:8px">${DI[d].ic} ${DI[d].n}</div>${si.map(item=>`<div class="item" id="pub-ic-${item.id}" style="margin-bottom:7px"><div class="item-head"><div class="item-en">${item.en}</div><div class="item-th">${item.th}</div></div><div class="scale-wrap"><div class="scale-lbl">1=Emerging · 2=Developing · 3=Good · 4=Excellent</div><div class="scale-btns">${[1,2,3,4].map(s=>`<button class="sb" id="pub-sb-${item.id}-${s}" onclick="setPubScore('${d}','${item.id}',${s})"><div class="sn">${s}</div><div class="sl">${s===1?'Emerging':s===2?'Developing':s===3?'Good':'Excellent'}</div></button>`).join('')}</div></div></div>`).join('')}</div>`;});
  }else{
    h+=`<div style="font-size:12px;color:var(--ink3);margin-bottom:12px">Not true (0) · Somewhat true (1) · Certainly true (2)</div>`;
    SDQ_ITEMS.forEach(item=>{const sub=SDQ_SUBS[item.sub];h+=`<div class="item" id="pub-sdqi-${item.id}" style="border-left:3px solid ${sub.c};margin-bottom:7px"><div class="item-head"><div class="item-code" style="color:${sub.c}">${sub.n}</div><div class="item-en">${item.en}</div><div class="item-th">${item.th}</div></div><div class="sdq-opt"><button class="so" id="pub-sdq0-${item.id}" onclick="setPubSDQ('${item.id}',0)">Not true</button><button class="so" id="pub-sdq1-${item.id}" onclick="setPubSDQ('${item.id}',1)">Somewhat</button><button class="so" id="pub-sdq2-${item.id}" onclick="setPubSDQ('${item.id}',2)">Certainly</button></div></div>`;});
  }
  h+=`<button class="btn btn-p" onclick="submitPubAssess()" style="margin-top:8px">See Results & Send Email</button><div style="height:20px"></div></div>`;
  return h;
}
function setPubScore(d,id,score){[1,2,3,4].forEach(s=>$(`pub-sb-${id}-${s}`)?.setAttribute('class','sb'));$(`pub-sb-${id}-${score}`)?.setAttribute('class',`sb on${score}`);$(`pub-ic-${id}`)?.setAttribute('class',`item s${score}`);if(!PUB.scores[d])PUB.scores[d]={};PUB.scores[d][id]=score;}
function setPubSDQ(id,val){[0,1,2].forEach(v=>$(`pub-sdq${v}-${id}`)?.classList.toggle('on',false));$(`pub-sdq${val}-${id}`)?.classList.toggle('on',true);if(!PUB.scores.sdq)PUB.scores.sdq={};PUB.scores.sdq[id]=val;}
async function submitPubAssess(){
  const f=fw(PUB.info.birthdate);let initialReport='';
  if(f==='cdc'){
    const domScores={};DOMS.forEach(d=>{const items=CDC[d]||[];const si=items.filter(i=>!i.type);const vals=si.map(i=>PUB.scores[d]?.[i.id]).filter(v=>v!==undefined);domScores[d]=vals.length?Math.round(vals.reduce((a,b)=>a+b)/vals.length*25):null;});
    const overall=Object.values(domScores).filter(v=>v!==null);const avg=overall.length?Math.round(overall.reduce((a,b)=>a+b)/overall.length):0;
    PUB.result={type:'cdc',scores:domScores,overall:avg};
    initialReport=`Initial Screening for ${PUB.info.childName}\n\nOverall: ${avg}/100\n${DOMS.map(d=>`${DI[d].n}: ${domScores[d]!==null?domScores[d]+'%':'Not answered'}`).join('\n')}`;
  }else{
    const sdqScores={sdqEmotional:0,sdqConduct:0,sdqHyper:0,sdqPeer:0,sdqProsocial:0};
    SDQ_ITEMS.forEach(item=>{let v=PUB.scores.sdq?.[item.id]??null;if(v===null)return;if(item.rev)v=2-v;sdqScores[item.sub]=(sdqScores[item.sub]||0)+v;});
    const tot=sdqScores.sdqEmotional+sdqScores.sdqConduct+sdqScores.sdqHyper+sdqScores.sdqPeer;
    PUB.result={type:'sdq',scores:sdqScores,total:tot};
